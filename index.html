<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Workspace</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>

<body>

  <h1>Trading Workspace</h1>
  <select id="symbol-select">
    <option value="BTCUSDT">BTCUSDT</option>
    <option value="ETHUSDT">ETHUSDT</option>
    <option value="SOLUSDT">SOLUSDT</option>
  </select>

  <select id="timeframe-select">
      <option value="1m">1m</option>
      <option value="15m">15m</option>
      <option value="1h">1h</option>
      <option value="4h">4h</option>
      <option value="1d">1d</option>
      <option value="1w">1w</option>
      <option value="1M">1M</option>
      <option value="1Y">1Y</option>
  </select>
  <div id="chart"></div>

 <div id="paper-trading">
  <p>Type: <span id="position-type">NONE</span></p>

  <p>Balance: <span id="balance">1000</span> USDT</p>

  <p>Position: <span id="position">0</span> BTC</p>
  
  <p>Entry Price: <span id="entry-price">0</span></p>

  <p>PnL: <span id="pnl">0</span></p>

  
  <button id="long-btn">LONG</button>
  <button id="short-btn">SHORT</button>
  <button id="close-btn">CLOSE</button>
</div>

<script src="js/api.js"></script>
<script src="app.js"></script>

</body>
</html>
</body>
</html>
